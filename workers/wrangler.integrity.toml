# ⛓️⚓⛓️  AveryOS™ Architecture Integrity Worker — Wrangler Configuration
#
# This file configures the standalone Cloudflare Worker that runs the hourly
# sovereign integrity pulse for the AveryOS™ system.
#
# To deploy this worker separately:
#   npx wrangler deploy --config workers/wrangler.integrity.toml --env production
#
# ─── Required Secrets ────────────────────────────────────────────────────────
#
# Before deploying, store the Bitcoin Watchdog API key as a Cloudflare Worker
# secret so the hourly pulse can verify the current Bitcoin block height:
#
#   npx wrangler secret put BITCOIN_API_KEY --env production
#
# The secret is accessed at runtime via `env.BITCOIN_API_KEY` inside
# runWatchdog() and is NEVER logged or exposed in responses.
# ─────────────────────────────────────────────────────────────────────────────

name = "averyos-integrity-worker"
account_id = "374875d33ef47a741a129bd5e716abff"
compatibility_date = "2026-02-05"
main = "architecture-integrity.ts"
compatibility_flags = ["nodejs_compat"]
legacy_env = false

# ─── Cron Triggers ───────────────────────────────────────────────────────────
# Fires the scheduled() handler (runWatchdog) at the top of every hour.
[triggers]
crons = ["0 * * * *"]

# ─── KV Namespace ────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "AVERY_KV"
id = "3ddd05bfb66549fca9e4ad1faccd72bd"

# ─── D1 Database ─────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "averyos_kernel_db"
database_id = "32491bfd-c9dc-4356-80e7-8d58efc1913e"

# ─── R2 Bucket ───────────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "VAULT_R2"
bucket_name = "cloudflare-managed-42f4b874"

# ─── Production Environment ──────────────────────────────────────────────────
[env.production]
workers_dev = false
vars = { SITE_URL = "https://averyos.com" }

[[env.production.kv_namespaces]]
binding = "AVERY_KV"
id = "3ddd05bfb66549fca9e4ad1faccd72bd"

[[env.production.d1_databases]]
binding = "DB"
database_name = "averyos_kernel_db"
database_id = "32491bfd-c9dc-4356-80e7-8d58efc1913e"

[[env.production.r2_buckets]]
binding = "VAULT_R2"
bucket_name = "cloudflare-managed-42f4b874"
