# ── 1,017-Notch API Rate Limiting ─────────────────────────────────────────────
# Protects the sovereign kernel from DDoS and probabilistic noise.
# Limits each IP to 1,017 requests per minute across the entire worker.
# Enforced in middleware.ts via env.RATE_LIMITER.limit({ key: ip }).
# namespace_id must be a positive integer (Cloudflare requirement — code 10021).
# 1017 matches the sovereign notch count theme.
[[unsafe.bindings]]
type = "ratelimit"
name = "RATE_LIMITER"
namespace_id = "1017"
simple = { limit = 1017, period = 60 }

# Handshake-specific rate limiting (Roadmap Gate 1.7 — 1,017-Notch Protection)
# The /api/v1/licensing/handshake and /api/v1/quarantine/handshake endpoints are
# additionally protected by middleware.ts which applies the RATE_LIMITER binding
# with a stricter per-path key: "handshake:<ip>" at 10 requests per 60 seconds.
# This prevents automated affidavit flooding while allowing legitimate usage.
[[unsafe.bindings]]
type = "ratelimit"
name = "RATE_LIMITER_HANDSHAKE"
namespace_id = "1018"
simple = { limit = 10, period = 60 }

# ── Cloudflare Cron Triggers ──────────────────────────────────────────────────
# Every-5-minute cron (Phase 82 / 107.1 / 110):
#   1. GET /api/v1/cron/package-evidence   — R2 forensic bundle packaging
#   2. GET /api/v1/cron/clock-escalation   — Compliance clock escalation + KaaS auto-settle
#   3. GET /api/v1/time/sovereign          — Sovereign Time Mesh D1 snapshot (Phase 110.1)
#      Archives a microsecond-precision consensus timestamp to D1 sovereign_time_log
#      on every tick, ensuring hourly mesh snapshots are durably persisted.
#
# Daily Stripe Reconciliation (Phase 93.5): runs at 07:00 UTC (00:00 MST).
# Triggers GET /api/v1/cron/reconcile to audit Stripe vs D1 sovereign_alignments.
[triggers]
crons = ["*/5 * * * *", "0 7 * * *"]

# ── Cloudflare Queues — D1 Surge Buffer (Phase 93.5 / 95.1) ──────────────────
# Prevents "Undercounting Drift" during high-volume surges (25k+ log events).
# The queue buffers sovereign_audit_log writes so no records are dropped under
# SQLite concurrency pressure.
#
# Activate via: wrangler queues create sovereign-log-ingress
# Then bind the producer and consumer here.
[[queues.producers]]
queue        = "sovereign-log-ingress"
binding      = "SOVEREIGN_LOG_QUEUE"

[[queues.consumers]]
queue        = "sovereign-log-ingress"
max_batch_size       = 100
max_batch_timeout    = 5
max_retries          = 3
dead_letter_queue    = "sovereign-log-ingress-dlq"
# Create queues with: wrangler queues create sovereign-log-ingress
#                     wrangler queues create sovereign-log-ingress-dlq

# ── Tier-10 ASN Rate Limiting Rules ──────────────────────────────────────────
# Additional programmatic rate limiting for Tier-10 ASNs (LEGAL_SCAN threat level 10).
# These [[unsafe.bindings]] rules protect the DER event endpoints from DDoS.
# Each rule enforces 1,017 requests per 60-second window per IP address.
# Applied to the most sensitive sovereign API routes.
#
# Note: production [[rate_limiting]] rules with enforcement_response are set via
# the Cloudflare dashboard (Firewall → Rate Limiting) for zero-downtime updates.
# The wrangler-level ratelimit binding above handles programmatic enforcement
# in middleware.ts (Worker-side gate).

# ── Jurisdiction-Aware Rate Limiting — Phase 107.1 (Gate 4) ─────────────────
# 1,017-Notch Rate Limiting rules keyed on jurisdiction (via resolveJurisdiction()).
# Each jurisdiction bucket gets 1,017 requests per 60-second window.
# Enforcement is handled in middleware.ts via RATE_LIMITER binding.
# The [[rate_limiting]] section below documents the intended Cloudflare config;
# the programmatic enforcement is applied in middleware.ts.
#
# Jurisdiction mapping (from lib/forensics/globalVault.ts::resolveJurisdiction):
#   US  → 17 U.S.C. § 504(c)(2) — primary statutory framework
#   EU  → EU AI Act Art. 53(1)(c) + CDSM Directive
#   UK  → CDPA 1988 §§ 22–23
#   JP  → Copyright Act Art. 30-4
#
# Rate limit keys:
#   rate_limit:US:<ip>   → 1,017 req / 60 s
#   rate_limit:EU:<ip>   → 1,017 req / 60 s  (EU AI Act compliance)
#   rate_limit:UK:<ip>   → 1,017 req / 60 s
#   rate_limit:JP:<ip>   → 1,017 req / 60 s
#   rate_limit:ANY:<ip>  → 1,017 req / 60 s  (default fallback)

