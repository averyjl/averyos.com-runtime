name = "averyoscom-runtime"
account_id = "374875d33ef47a741a129bd5e716abff"
compatibility_date = "2026-02-05"
main = ".open-next/worker.js"
compatibility_flags = ["nodejs_compat"]

# ── Build configuration ────────────────────────────────────────────────────────
# Tells Cloudflare Workers CI and local `wrangler dev` the correct build command.
# This runs BEFORE wrangler bundles the worker, ensuring .open-next/ is populated.
[build]
command = "npm run build:cloudflare"

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

[vars]
NODE_VERSION = "22"
SITE_URL = "https://averyos.com"
NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
NEXT_TELEMETRY_DISABLED = "1"
# Sovereign node labels (non-secret identifiers — real values set via Cloudflare secret store)
NODE_01_LABEL = "Phone Node (NODE_01)"
NODE_02_LABEL = "PC Node (NODE_02) — Llama via Ollama"
NODE_02_LOCAL_MODEL = "llama3.3:70b"
# DNS zone for TXT anchor verification
CLOUDFLARE_DNS_ZONE = "averyos.com"
# GoldenLockArtifact merkle root — used for runtime integrity assertion
GOLDEN_LOCK_MERKLE_ROOT = "88b737926219feb345804a22db4ae3fb2d5b21ca63686075ee04aace4d8ac4fe180289fe821a412944420ec9083b6a6a0e902fc8ac2e0325511cb7ab99ce2abe"

[[kv_namespaces]]
binding = "KV_LOGS"
id = "3ddd05bfb66549fca9e4ad1faccd72bd"

# ANCHOR_STORE — sovereign capsule anchoring
[[kv_namespaces]]
binding = "ANCHOR_STORE"
id = "6ec58bcb1a7244299e5d8b0c052e3f10"

# AVERY_KV — architecture-integrity worker genesis-state drift detection
[[kv_namespaces]]
binding = "AVERY_KV"
id = "3ddd05bfb66549fca9e4ad1faccd72bd"

# AVERYOS_LOGIC_GATES — sovereign logic gate store
[[kv_namespaces]]
binding = "AVERYOS_LOGIC_GATES"
id = "1a5217c91e6c4a568875f2928acb69b9"

[[d1_databases]]
binding = "DB"
database_name = "averyos_kernel_db"
database_id = "32491bfd-c9dc-4356-80e7-8d58efc1913e"
migrations_dir = "migrations"
# Apply migrations: npx wrangler d1 migrations apply averyos_kernel_db --remote

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true 
persist = true
head_sampling_rate = 1

[[routes]]
pattern = "www.averyos.com"
custom_domain = true

[[routes]]
pattern = "averyos.com"
custom_domain = true

[[routes]]
pattern = "anchor.averyos.com"
custom_domain = true

[[routes]]
pattern = "api.averyos.com"
custom_domain = true

[[routes]]
pattern = "terminal.averyos.com"
custom_domain = true

[[routes]]
pattern = "lighthouse.averyos.com"
custom_domain = true

# Edge Redirect (Gate 100.1): enterpriseregistration.averyos.com/* → /licensing/enterprise
# Azure/O365 enterprise procurement bots and Tier-10 ASN probes that target the
# enterprise registration subdomain are permanently redirected (301) to the
# sovereign Enterprise Licensing Portal.  The redirect is enforced in
# middleware.ts (hostname === 'enterpriseregistration.averyos.com') so it fires
# at the edge before any Next.js route handler runs.
[[routes]]
pattern = "enterpriseregistration.averyos.com"
custom_domain = true

[[r2_buckets]]
binding = 'VAULT'
bucket_name = 'cloudflare-managed-42f4b874'

# VAULT_R2 — architecture integrity session audit logs (scoped under session-logs/integrity/ key prefix)
# Replication: evidence bundles are written under evidence/ prefix for forensic audit trail.
[[r2_buckets]]
binding = 'VAULT_R2'
bucket_name = 'cloudflare-managed-42f4b874'

[[r2_buckets]]
binding = 'averyos_log_push'
bucket_name = 'cloudflare-managed-42f4b874'

