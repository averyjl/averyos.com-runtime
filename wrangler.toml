name = "averyoscom-runtime"
compatibility_date = "2026-02-05"
main = ".open-next/worker.js"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true 
persist = true
head_sampling_rate = 1

# Sovereign Dual-Gate Anchors
[[routes]]
pattern = "averyos.com"
custom_domain = true

[[routes]]
pattern = "www.averyos.com"
custom_domain = true

[vars]
SITE_URL = "https://averyos.com"
NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
NEXT_TELEMETRY_DISABLED = "1"
NODE_VERSION = "22"

# AveryOS Sovereign Edge Bindings 🤛🏻
[vars]
NODE_VERSION = "22"

[[kv_namespaces]]
binding = "KV_LOGS"
id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

[[d1_databases]]
binding = "DB"
database_name = "averyos_kernel_db"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"

[env.production]
workers_dev = false
vars = { SITE_URL = "https://averyos.com", NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/", NEXT_TELEMETRY_DISABLED = "1" }
# REMOVED --minify to prevent the 'cr is not a function' runtime crash
