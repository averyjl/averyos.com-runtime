name = "averyoscom-runtime"
account_id = "374875d33ef47a741a129bd5e716abff"
compatibility_date = "2026-02-05"
main = ".open-next/worker.js"
compatibility_flags = ["nodejs_compat"]
# legacy_env = false uses the service-environments PUT endpoint (/workers/services/{name}/environments/{env})
# instead of the Workers Versions API (/workers/scripts/{name}/versions).
# The service-environments endpoint requires `Workers KV Storage: Edit` permission on the API token when KV
# bindings are present. Ensure CLOUDFLARE_API_TOKEN includes `Workers KV Storage: Edit`.
legacy_env = false

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

[vars]
NODE_VERSION = "22"
SITE_URL = "https://averyos.com"
NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
NEXT_TELEMETRY_DISABLED = "1"
# Sovereign node labels (non-secret identifiers — real values set via Cloudflare secret store)
NODE_01_LABEL = "Phone Node (NODE_01)"
NODE_02_LABEL = "PC Node (NODE_02) — Llama via Ollama"
NODE_02_LOCAL_MODEL = "llama3.3:70b"
# DNS zone for TXT anchor verification
CLOUDFLARE_DNS_ZONE = "averyos.com"
# GoldenLockArtifact merkle root — used for runtime integrity assertion
GOLDEN_LOCK_MERKLE_ROOT = "88b737926219feb345804a22db4ae3fb2d5b21ca63686075ee04aace4d8ac4fe180289fe821a412944420ec9083b6a6a0e902fc8ac2e0325511cb7ab99ce2abe"

[[kv_namespaces]]
binding = "KV_LOGS"
id = "3ddd05bfb66549fca9e4ad1faccd72bd"

# ANCHOR_STORE — sovereign capsule anchoring
# Create with: npx wrangler kv:namespace create ANCHOR_STORE
# Then replace the id below with the generated namespace ID.
[[kv_namespaces]]
binding = "ANCHOR_STORE"
id = "3ddd05bfb66549fca9e4ad1faccd72bd"

[[d1_databases]]
binding = "DB"
database_name = "averyos_kernel_db"
database_id = "32491bfd-c9dc-4356-80e7-8d58efc1913e"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true 
persist = true
head_sampling_rate = 1

[[routes]]
pattern = "averyos.com"
custom_domain = true

[[routes]]
pattern = "www.averyos.com"
custom_domain = true

# ── Cloudflare Secret Store ────────────────────────────────────────────────────
# Set these via `wrangler secret put <NAME>` or the Cloudflare dashboard.
# Do NOT add real values here — this block is documentation only.
#
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put GITHUB_PAT
#   wrangler secret put VAULT_PASSPHRASE
#   wrangler secret put BLOCKCHAIN_API_KEY      # BlockCypher — BTC block anchor salt
#   wrangler secret put TAI_LICENSE_KEY         # TAI™ license gate for /api/v1/resonance
#   wrangler secret put GABRIEL_SENTINEL_WEBHOOK # GabrielOS™ Sentinel webhook URL
#   wrangler secret put PUSHOVER_APP_TOKEN      # Pushover notifications
#   wrangler secret put PUSHOVER_USER_KEY       # Pushover user key
#   wrangler secret put FIREBASE_PROJECT_ID     # Firebase Admin SDK
#   wrangler secret put FIREBASE_CLIENT_EMAIL
#   wrangler secret put FIREBASE_PRIVATE_KEY
#   wrangler secret put FIREBASE_DATABASE_URL
#   wrangler secret put SOVEREIGN_ANCHOR_SALT   # .anchor-salt value (generated by npm run setup)
#   wrangler secret put NODE_01_ID              # Phone node identifier
#   wrangler secret put NODE_02_ID              # PC node identifier
#   wrangler secret put CLOUDFLARE_DNS_API_TOKEN # DNS:Read for TXT anchor verification
#   wrangler secret put CREATOR_WEBHOOK_URL     # licenseGate.js SIG_MISMATCH notifications

[env.production]
workers_dev = false
vars = { SITE_URL = "https://averyos.com", NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/", NEXT_TELEMETRY_DISABLED = "1", NODE_VERSION = "22" }

[[env.production.kv_namespaces]]
binding = "KV_LOGS"
id = "3ddd05bfb66549fca9e4ad1faccd72bd"

[[env.production.kv_namespaces]]
binding = "ANCHOR_STORE"
# Create with: npx wrangler kv:namespace create ANCHOR_STORE --env production
# Replace the id below with the generated namespace ID.
id = "3ddd05bfb66549fca9e4ad1faccd72bd"

[[env.production.kv_namespaces]]
binding = "AVERYOS_LOGIC_GATES"
id = "1a5217c91e6c4a568875f2928acb69b9"

[[env.production.d1_databases]]
binding = "DB"
database_name = "averyos_kernel_db"
database_id = "32491bfd-c9dc-4356-80e7-8d58efc1913e"

[[routes]]
pattern = "anchor.averyos.com"
custom_domain = true

[[env.production.routes]]
pattern = "www.averyos.com"
custom_domain = true

[[r2_buckets]]
binding = 'VAULT'
bucket_name = 'cloudflare-managed-42f4b874'

# AVERY_KV — used by the architecture-integrity worker for genesis-state drift detection
[[kv_namespaces]]
binding = "AVERY_KV"
id = "3ddd05bfb66549fca9e4ad1faccd72bd"

# VAULT_R2 — architecture integrity session audit logs (shares bucket with VAULT;
# logs are scoped under the session-logs/integrity/ key prefix to avoid collisions)
[[r2_buckets]]
binding = 'VAULT_R2'
bucket_name = 'cloudflare-managed-42f4b874'

[[env.production.r2_buckets]]
binding = 'VAULT'
bucket_name = 'cloudflare-managed-42f4b874'

# AVERY_KV (production)
[[env.production.kv_namespaces]]
binding = "AVERY_KV"
id = "3ddd05bfb66549fca9e4ad1faccd72bd"

# VAULT_R2 (production) — architecture integrity session logs (shares bucket with VAULT;
# scoped under session-logs/integrity/ key prefix)
[[env.production.r2_buckets]]
binding = 'VAULT_R2'
bucket_name = 'cloudflare-managed-42f4b874'

# ── 1,017-Notch API Rate Limiting ─────────────────────────────────────────────
# Protects the sovereign kernel from DDoS and probabilistic noise.
# Limits each IP to 1,017 requests per minute across the entire worker.
# Enforced in middleware.ts via env.RATE_LIMITER.limit({ key: ip }).
# To create the namespace: (no CLI action needed — Workers RateLimit binding is automatic)
[[unsafe.bindings]]
type = "ratelimit"
name = "RATE_LIMITER"
# namespace_id scopes the counter — must be a string unique to this worker
namespace_id = "averyos-rate-limiter-1017"
simple = { limit = 1017, period = 60 }
