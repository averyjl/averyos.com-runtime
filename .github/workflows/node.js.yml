# AveryOS™ Sovereign CI — node.js.yml 🤛🏻
name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ] # This ensures checks run on PRs before merging

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x # Hardened to Node 22 only
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present

  verify_sovereign_schema:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
    - name: "Sovereign Gate: D1 Schema Check"
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      run: |
        echo "::add-mask::${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
        npx wrangler d1 execute averyos_kernel_db --remote --command "SELECT name FROM sqlite_master WHERE type='table' AND name='kernel_locks';" | grep "kernel_locks"
