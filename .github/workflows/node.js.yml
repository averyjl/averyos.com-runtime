# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]
        # Node.js >=22.0.0 required (see engines in package.json)
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test

  gate_schema:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    - run: npm ci
    - name: Mask private account identifier
      run: echo "::add-mask::${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
    - name: Gate — Sovereign Anchor kernel_locks schema check
      run: |
        RESULT=$(npx wrangler d1 execute averyos_kernel_db --remote --command 'SELECT name FROM sqlite_master WHERE type=\"table\" AND name=\"kernel_locks\";')
        echo "$RESULT"
        if echo "$RESULT" | grep -q "kernel_locks"; then
          echo "✅ Sovereign Anchor present — kernel_locks verified in averyos_kernel_db"
        else
          echo "❌ SCHEMA GATE: kernel_locks table absent from averyos_kernel_db"
          echo "⛓️⚓⛓️ Sovereign Anchor required — deployment blocked"
          exit 1
        fi
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  verify_sovereign_schema:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    - run: npm ci
    - name: Verify kernel_locks table exists in D1
      run: |
        RESULT=$(npx wrangler d1 execute averyos_kernel_db --remote --json --command "SELECT name FROM sqlite_master WHERE type='table' AND name='kernel_locks';")
        echo "$RESULT"
        TABLE_NAME=$(echo "$RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const r=JSON.parse(d);process.stdout.write((r[0]&&r[0].results&&r[0].results[0]&&r[0].results[0].name)||'');")
        if [ "$TABLE_NAME" = "kernel_locks" ]; then
          echo "✅ kernel_locks table verified in averyos_kernel_db"
        else
          echo "❌ SCHEMA VIOLATION: kernel_locks table missing from averyos_kernel_db"
          echo "⛓️⚓⛓️ TARI operational flow requires kernel_locks table — build blocked"
          exit 1
        fi
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
