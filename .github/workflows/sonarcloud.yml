# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow helps you trigger a SonarCloud analysis of your code and populates
# GitHub Code Scanning alerts with the vulnerabilities found.
# Free for open source project.

# 1. Login to SonarCloud.io using your GitHub account

# 2. Import your project on SonarCloud
#     * Add your GitHub organization first, then add your repository as a new project.
#     * Please note that many languages are eligible for automatic analysis,
#       which means that the analysis will start automatically without the need to set up GitHub Actions.
#     * This behavior can be changed in Administration > Analysis Method.
#
# 3. Follow the SonarCloud in-product tutorial
#     * a. Copy/paste the Project Key and the Organization Key into the args parameter below
#          (You'll find this information in SonarCloud. Click on "Information" at the bottom left)
#
#     * b. Generate a new token and add it to your Github repository's secrets using the name SONAR_TOKEN
#          (On SonarCloud, click on your avatar on top-right > My account > Security
#           or go directly to https://sonarcloud.io/account/security/)

# Feel free to take a look at our documentation (https://docs.sonarcloud.io/getting-started/github/)
# or reach out to our community forum if you need some help (https://community.sonarsource.com/c/help/sc/9)

name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read # allows SonarCloud to decorate PRs with analysis results

jobs:
  Analysis:
    runs-on: ubuntu-latest
    # Skip gracefully when SONAR_TOKEN is not configured
    if: secrets.SONAR_TOKEN != ''

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0  # Required for SonarCloud blame data

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Generate LCOV coverage for lib/ modules (unit-tested) so SonarCloud
      # has real coverage data for the code that IS unit-tested.
      # app/, pages/, workers/ are excluded from coverage in sonar-project.properties
      # because they are integration/E2E tested, not unit-tested.
      - name: Generate LCOV coverage report
        run: |
          mkdir -p coverage
          node --loader ./__tests__/loader.mjs \
               --experimental-strip-types \
               --experimental-test-coverage \
               --test-reporter=spec \
               --test-reporter-destination=stdout \
               --test-reporter=lcov \
               --test-reporter-destination=coverage/lcov.info \
               --test \
               __tests__/tariUniversal.test.ts \
               __tests__/sovereignKeys.test.ts \
               __tests__/timeMesh.test.ts \
               __tests__/wafLogic.test.ts \
               __tests__/driftShield.test.ts \
               __tests__/sovereignError.test.ts \
               __tests__/timePrecision.test.ts \
               __tests__/qaEngine.test.ts \
               __tests__/clearTextStorage.test.ts \
               __tests__/vaultsigWebhook.test.ts \
               __tests__/protocol.test.ts \
               __tests__/agentSummary.test.ts \
               __tests__/coreManifest.test.ts \
               __tests__/pathSanitizer.test.ts \
               __tests__/sovereignGuard.test.ts \
               __tests__/sovereignFetch.test.ts \
               __tests__/unmaskCore.test.ts \
               __tests__/meshDiscovery.test.ts || true
        env:
          NODE_OPTIONS: "--no-warnings"
        continue-on-error: true  # Coverage failure does not block Sonar analysis

      - name: Analyze with SonarCloud
        # Uses sonar-project.properties for projectKey and organization
        # (averyjl_averyos-com-runtime / averyjl)
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
