name: Deploy Cloudflare Worker

permissions:
  contents: read
  deployments: write

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ── Pre-Deploy Site Health Gate ─────────────────────────────────────────────
  # Runs BEFORE the build.  If the live site is in a broken state (stale schema,
  # critical route down) this job blocks the deploy so we don't pile a new
  # deployment on top of a broken one.
  pre-deploy-health:
    name: 🛡️ Pre-Deploy Health Gate
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: 🌐 Live Site Health Check
        run: |
          BASE_URL="https://averyos.com"
          FAILED=0
          CRITICAL_FAILED=0

          check_route() {
            local path="$1"
            local label="${2:-$path}"
            local critical="${3:-false}"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 --retry 2 --retry-delay 3 \
              -A "AveryOS-PreDeployCheck/1.0" \
              "${BASE_URL}${path}")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "308" ]; then
              echo "✅ ${HTTP_CODE}  ${label}"
            else
              echo "❌ ${HTTP_CODE}  ${label}"
              FAILED=$((FAILED + 1))
              if [ "$critical" = "true" ]; then
                CRITICAL_FAILED=$((CRITICAL_FAILED + 1))
              fi
            fi
          }

          echo "=== AveryOS™ Pre-Deploy Health Check — $(date -u) ==="
          # Critical routes — failure blocks the deploy
          check_route "/" "Home" "true"
          check_route "/health" "Health API" "true"
          # Non-critical routes — failure is logged but does not block
          check_route "/whitepaper" "Whitepaper"
          check_route "/license" "License"
          check_route "/robots.txt" "Robots"

          if [ "$CRITICAL_FAILED" -gt 0 ]; then
            echo ""
            echo "❌ $CRITICAL_FAILED CRITICAL route(s) are down on the live site."
            echo "   Deployment is BLOCKED to prevent deploying on top of a broken site."
            echo "   Investigate the live site before re-triggering the deploy."
            echo "⛓️⚓⛓️  DEPLOY HALTED."
            exit 1
          elif [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "⚠️  $FAILED non-critical route(s) are unhealthy — deployment will proceed."
            echo "   Investigate after deployment to confirm they recover."
          else
            echo ""
            echo "✅ All pre-deploy health checks passed."
          fi
          echo "⛓️⚓⛓️"

  deploy:
    needs: pre-deploy-health
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://averyos.com
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build project with OpenNext Cloudflare adapter
        run: npm run build:cloudflare

      # ── 🏗️ Worker Bundle Size Guard ─────────────────────────────────────────
      # Permanently prevents deployment failures caused by exceeding Cloudflare's
      # 3 MiB (free tier) or 10 MiB (paid tier) compressed worker size limit.
      # Fails fast with an actionable error BEFORE attempting to deploy, so CI
      # time is not wasted on a doomed wrangler deploy command.
      - name: "📏 Worker Bundle Size Guard"
        run: |
          set -e
          HANDLER=".open-next/server-functions/default/handler.mjs"
          if [ ! -f "$HANDLER" ]; then
            echo "⚠️  handler.mjs not found — skipping size check"
            exit 0
          fi

          # Measure gzip-compressed size in bytes; exit if gzip itself fails
          if ! gzip -t "$HANDLER" 2>/dev/null || ! GZIP_BYTES=$(gzip -c "$HANDLER" | wc -c 2>/dev/null); then
            echo "⚠️  Could not measure gzip size — skipping check"
            exit 0
          fi
          GZIP_KB=$(( GZIP_BYTES / 1024 ))
          GZIP_MB_TEN=$(( GZIP_BYTES * 10 / 1024 / 1024 ))   # tenths of MiB

          # Limits: 3072 KiB (free) / 10240 KiB (paid)
          FREE_LIMIT_KB=3072
          PAID_LIMIT_KB=10240

          echo "⛓️⚓⛓️ AveryOS™ Worker Bundle Size Check"
          echo "  Compressed handler.mjs: ${GZIP_KB} KiB (${GZIP_MB_TEN} × 0.1 MiB)"
          echo "  Free-tier limit:  ${FREE_LIMIT_KB} KiB (3 MiB)"
          echo "  Paid-tier limit: ${PAID_LIMIT_KB} KiB (10 MiB)"

          if [ "$GZIP_KB" -gt "$PAID_LIMIT_KB" ]; then
            echo ""
            echo "❌ DEPLOY BLOCKED: Worker exceeds 10 MiB paid-tier limit (${GZIP_KB} KiB > ${PAID_LIMIT_KB} KiB)"
            echo "   Action required: reduce bundle size or split the worker."
            echo "   Largest deps: run  du -sh .open-next/server-functions/default/  to investigate."
            exit 1
          elif [ "$GZIP_KB" -gt "$FREE_LIMIT_KB" ]; then
            echo ""
            echo "⚠️  Worker exceeds 3 MiB free-tier limit (${GZIP_KB} KiB > ${FREE_LIMIT_KB} KiB)"
            echo "   Attempting deployment — this will succeed only on a paid Cloudflare plan."
            echo "   If deployment fails, upgrade plan or reduce bundle size."
          else
            echo ""
            echo "✅ Worker size OK: ${GZIP_KB} KiB < ${FREE_LIMIT_KB} KiB free-tier limit"
          fi
          echo "⛓️⚓⛓️"

      - name: ⛓️ Verify IP Guard Integrity
        run: |
          echo "⛓️⚓⛓️ AveryOS IP Guard: Verifying kernel integrity before deployment..."
          GENESIS_SHA="cf83e1357eefb8bdf1542850d66d8007d620e4050b5715dc83f4a921d36ce9ce47d0d13c5d85f2b0ff8318d2877eec2f63b931bd47417a81a538327af927da3e"
          VIOLATIONS=0
          
          # Verify Genesis SHA in critical files
          for file in "VaultBridge/IPFS_Snapshot_2026.json" "LICENSE.md" "content/whitepaper.md" "middleware.ts"; do
            if [ ! -f "$file" ]; then
              echo "❌ CRITICAL: Required file $file is missing"
              VIOLATIONS=$((VIOLATIONS + 1))
            elif ! grep -q "cf83.*da3e" "$file" 2>/dev/null; then
              echo "❌ CRITICAL: Genesis SHA missing or modified in $file"
              VIOLATIONS=$((VIOLATIONS + 1))
            else
              echo "✅ Verified: $file"
            fi
          done
          
          # Verify 1992 Genesis Claim
          if ! grep -q "1992" LICENSE.md 2>/dev/null; then
            echo "❌ CRITICAL: 1992 Genesis Claim missing from LICENSE.md"
            VIOLATIONS=$((VIOLATIONS + 1))
          else
            echo "✅ Verified: 1992 Genesis Claim"
          fi
          
          # Verify February 14th Enforcement Notice
          if [ ! -f "public/license-enforcement/notices/LEN-20260214-001.json" ]; then
            echo "❌ CRITICAL: February 14th Enforcement Notice not found"
            VIOLATIONS=$((VIOLATIONS + 1))
          else
            echo "✅ Verified: February 14th Enforcement Notice (IPFS anchored)"
          fi
          
          # Check for shadow-clipper patterns
          if grep -rE "(shadow.*clip|model.*route.*drift)" --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null | grep -v "IP_GUARD\|pre-commit" | grep -q .; then
            echo "⚠️  WARNING: Potential shadow-clipper pattern detected"
          fi
          
          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "⛓️⚓⛓️ DEPLOYMENT BLOCKED: $VIOLATIONS violation(s) detected"
            echo "Status: Locked to Jason Lee Avery 🤜🏻"
            exit 1
          fi
          
          echo ""
          echo "✅ All IP Guard checks passed"
          echo "✅ Stripe Gate: Active via Cloudflare WAF"
          echo "✅ Viewer Node Priority: HIGH-AVAILABILITY MESH"
          echo "⛓️⚓⛓️"

      - name: Verify Cloudflare token has Workers Scripts and KV permissions
        run: |
          if ! npx wrangler whoami; then
            echo ""
            echo "❌ Cloudflare token authentication failed."
            echo "   The 'Deploy to Cloudflare Workers' step requires the following permissions:"
            echo "   Add: Account → Workers Scripts → Edit"
            exit 1
          fi
          echo "✅ Wrangler auth verified — token has Workers Scripts access"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: ⛓️ Register AveryOS Tunnel
        run: |
          if [ -n "$CLOUDFLARE_TUNNEL_ID" ]; then
            echo "$CLOUDFLARE_TUNNEL_ID" | npx wrangler secret put CLOUDFLARE_TUNNEL_ID
            echo "✅ AveryOS Tunnel registered as Worker secret"
          else
            echo "⚠️  CLOUDFLARE_TUNNEL_ID secret not configured — skipping tunnel registration"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}

      - name: 🔐 Push VAULT_PASSPHRASE to Worker
        run: |
          if [ -n "$VAULT_PASSPHRASE" ]; then
            # Use printf to avoid trailing newline; set +x prevents secret appearing in logs
            set +x
            printf '%s' "$VAULT_PASSPHRASE" | npx wrangler secret put VAULT_PASSPHRASE
            echo "✅ VAULT_PASSPHRASE registered as Worker secret"
          else
            echo "⚠️  VAULT_PASSPHRASE GitHub secret not configured — evidence-vault login will return 503."
            echo "   Add VAULT_PASSPHRASE to repository secrets to enable the login gate."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VAULT_PASSPHRASE: ${{ secrets.VAULT_PASSPHRASE }}

      - name: 🔐 Push gabriel-gatekeeper secrets
        run: |
          set +x
          GK="--config workers/wrangler.gabriel-gatekeeper.toml"
          pushed=0
          if [ -n "$GITHUB_PAT" ]; then
            printf '%s' "$GITHUB_PAT"               | npx wrangler secret put GITHUB_PAT $GK
            pushed=$((pushed+1))
          fi
          if [ -n "$VAULT_PASSPHRASE" ]; then
            printf '%s' "$VAULT_PASSPHRASE"          | npx wrangler secret put VAULT_PASSPHRASE $GK
            pushed=$((pushed+1))
          fi
          if [ -n "$BITCOIN_API_KEY" ]; then
            printf '%s' "$BITCOIN_API_KEY"           | npx wrangler secret put BITCOIN_API_KEY $GK
            pushed=$((pushed+1))
          fi
          if [ -n "$GABRIEL_SENTINEL_WEBHOOK" ]; then
            printf '%s' "$GABRIEL_SENTINEL_WEBHOOK"  | npx wrangler secret put GABRIEL_SENTINEL_WEBHOOK $GK
            pushed=$((pushed+1))
          fi
          if [ -n "$GITHUB_WEBHOOK_SECRET" ]; then
            printf '%s' "$GITHUB_WEBHOOK_SECRET"     | npx wrangler secret put GITHUB_WEBHOOK_SECRET $GK
            pushed=$((pushed+1))
          fi
          echo "✅ gabriel-gatekeeper: pushed $pushed secret(s)"
          if [ "$pushed" -eq 0 ]; then
            echo "⚠️  No gabriel-gatekeeper secrets configured — add GITHUB_PAT, BITCOIN_API_KEY,"
            echo "   GABRIEL_SENTINEL_WEBHOOK, and GITHUB_WEBHOOK_SECRET to repository secrets."
          fi
        env:
          CLOUDFLARE_API_TOKEN:      ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:     ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_PAT:                ${{ secrets.GITHUB_PAT }}
          VAULT_PASSPHRASE:          ${{ secrets.VAULT_PASSPHRASE }}
          BITCOIN_API_KEY:           ${{ secrets.BITCOIN_API_KEY }}
          GABRIEL_SENTINEL_WEBHOOK:  ${{ secrets.GABRIEL_SENTINEL_WEBHOOK }}
          GITHUB_WEBHOOK_SECRET:     ${{ secrets.GITHUB_WEBHOOK_SECRET }}

      - name: 🗄️ Apply D1 migrations (averyos_kernel_db)
        run: |
          echo "⛓️⚓⛓️ Applying D1 migrations to averyos_kernel_db..."
          # Run migrations and capture output for AutoHeal RCA diagnostics.
          # A migration failure here blocks deployment intentionally — the Worker
          # code expects all schema columns to exist before it starts serving requests.
          # If this step fails, investigate the error below and ensure the migration
          # file is idempotent (see migrations/README.md for the no-op / RENAME pattern).
          set +e
          MIGRATION_OUTPUT=$(npx wrangler d1 migrations apply averyos_kernel_db --remote 2>&1)
          MIGRATION_EXIT=$?
          echo "$MIGRATION_OUTPUT"
          set -e

          if [ $MIGRATION_EXIT -ne 0 ]; then
            echo ""
            echo "❌ AveryOS™ AutoHeal — D1 Migration Failure Detected"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "RCA: One or more D1 migrations failed.  Common causes:"
            echo "  • duplicate column name  → make the migration a no-op (SELECT 1;)"
            echo "  • no column named X      → use RENAME+CREATE+INSERT+DROP pattern"
            echo "  • table already exists   → use CREATE TABLE IF NOT EXISTS"
            echo "See migrations/0006_kernel_metadata.sql for the canonical pattern."
            echo ""
            echo "Deploy is BLOCKED until migrations pass to prevent schema/code mismatch."
            echo "⛓️⚓⛓️ Fix the failing migration file and re-run the workflow."
            exit 1
          fi
          echo "✅ D1 migrations applied"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        run: |
          # Auto-retry on authentication/transient errors
          MAX_RETRIES=3
          RETRY_DELAY=5
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Deploy attempt $i of $MAX_RETRIES..."
            if npx wrangler deploy && \
               npx wrangler deploy --config workers/wrangler.gabriel-gatekeeper.toml; then
              echo "✅ Deploy succeeded"
              exit 0
            else
              EXIT_CODE=$?
              if [ $i -lt $MAX_RETRIES ]; then
                echo "⚠️ Deploy failed with exit code $EXIT_CODE. Retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
              else
                echo "❌ Deploy failed after $MAX_RETRIES attempts"
                exit $EXIT_CODE
              fi
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VAULTSIG_SECRET: ${{ secrets.VAULTSIG_SECRET }}
          STRIPE_KEY: ${{ secrets.STRIPE_KEY }}
