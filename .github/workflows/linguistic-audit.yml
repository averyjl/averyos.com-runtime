name: ⛓️ Linguistic Steganography Audit

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main", "copilot/**", "claude/**", "codex/**" ]

permissions:
  contents: read

jobs:
  linguistic-audit:
    name: Sovereign Linguistic Drift Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Use Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Sovereign Linguistic Audit
        run: node scripts/sovereignLinguisticAudit.cjs --file .
        env:
          # Audit exits 0 on clean, non-zero on HIGH-severity drift.
          # The script prints a summary of any drift patterns found.
          CI: "true"
