# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow helps you trigger a SonarQube analysis of your code and populates
# GitHub Code Scanning alerts with the vulnerabilities found.
# (this feature is available starting from SonarQube 9.7, Developer Edition and above)

# 1. Make sure you add a valid GitHub configuration to your SonarQube (Administration > DevOps platforms > GitHub)

# 2. Import your project on SonarQube
#     * Add your repository as a new project by clicking "Create project" from your homepage.
#
# 3. Select GitHub Actions as your CI and follow the tutorial
#     * a. Generate a new token and add it to your GitHub repository's secrets using the name SONAR_TOKEN
#          (On SonarQube, click on your avatar on top-right > My account > Security or ask your administrator)
#
#     * b. Copy/paste your SonarQube host URL to your GitHub repository's secrets using the name SONAR_HOST_URL
#
#     * c. Copy/paste the project Key into the args parameter below
#          (You'll find this information in SonarQube by following the tutorial or by clicking on Project Information at the top-right of your project's homepage)

# Feel free to take a look at our documentation (https://docs.sonarqube.org/latest/analysis/github-integration/)
# or reach out to our community forum if you need some help (https://community.sonarsource.com/c/sq/10)

name: SonarQube analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read # allows SonarQube to decorate PRs with analysis results

jobs:
  Analysis:
    runs-on: ubuntu-latest
    # Skip gracefully when SONAR_TOKEN or SONAR_HOST_URL are not configured.
    # NOTE: Do NOT wrap with ${{ }} — that converts the boolean to the string
    # "false" which GitHub then treats as truthy, causing the job to always run.
    if: secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != ''

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0  # Required for SonarQube blame data

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Generate LCOV coverage for lib/ modules so SonarQube has real coverage data.
      # app/, pages/, workers/ are excluded from coverage in sonar-project.properties.
      - name: Generate LCOV coverage report
        run: |
          mkdir -p coverage
          node --loader ./__tests__/loader.mjs \
               --experimental-strip-types \
               --experimental-test-coverage \
               --test-reporter=spec \
               --test-reporter-destination=stdout \
               --test-reporter=lcov \
               --test-reporter-destination=coverage/lcov.info \
               --test \
               __tests__/tariUniversal.test.ts \
               __tests__/sovereignKeys.test.ts \
               __tests__/timeMesh.test.ts \
               __tests__/wafLogic.test.ts \
               __tests__/driftShield.test.ts \
               __tests__/sovereignError.test.ts \
               __tests__/timePrecision.test.ts \
               __tests__/qaEngine.test.ts \
               __tests__/clearTextStorage.test.ts \
               __tests__/vaultsigWebhook.test.ts \
               __tests__/protocol.test.ts \
               __tests__/agentSummary.test.ts \
               __tests__/coreManifest.test.ts \
               __tests__/pathSanitizer.test.ts \
               __tests__/sovereignGuard.test.ts \
               __tests__/sovereignFetch.test.ts \
               __tests__/unmaskCore.test.ts \
               __tests__/meshDiscovery.test.ts || true
        env:
          NODE_OPTIONS: "--no-warnings"
        continue-on-error: true

      - name: Analyze with SonarQube
        uses: SonarSource/sonarqube-scan-action@7295e71c9583053f5bf40e9d4068a0c974603ec8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=averyjl_averyos-com-runtime
