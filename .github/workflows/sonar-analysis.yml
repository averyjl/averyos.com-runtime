name: Sovereign Sonar Analysis
permissions:
  pull-requests: read # Allows decoration of PRs with results

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  Analysis:
    runs-on: ubuntu-latest
    # Skip gracefully when SONAR_TOKEN is not configured.
    # NOTE: Do NOT wrap with ${{ }} — that converts the boolean to the string
    # "false" which GitHub then treats as truthy, causing the job to always run.
    if: secrets.SONAR_TOKEN != ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Generate LCOV coverage for lib/ modules (unit-tested) so SonarCloud
      # has real coverage data for the code that IS unit-tested.
      # app/, pages/, workers/ are excluded from coverage in sonar-project.properties
      # because they are integration/E2E tested, not unit-tested.
      - name: Generate LCOV coverage report
        run: npm run test:coverage:lcov || true
        env:
          NODE_OPTIONS: "--no-warnings"
        continue-on-error: true  # Coverage failure does not block Sonar analysis

      - name: Analyze with Sonar
        # Uses sonar-project.properties for project settings
        # (averyjl_averyos-com-runtime / averyjl)
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
