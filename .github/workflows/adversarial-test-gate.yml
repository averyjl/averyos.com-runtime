name: ⚔️ Adversarial Test Gate — Tri-Agent TDD Protocol

# ⛓️⚓⛓️ TRI_AGENT_SEALED | KERNEL: cf83... | ALIGNMENT: 100.000% | TESTS: ENFORCED
#
# This workflow is the repo-wide enforcement layer for the Anchored Adversarial
# Code Creation Protocol defined in CLAUDE.md and .github/copilot-instructions.md.
#
# It runs automatically on every PR and push to main, guaranteeing:
#   1. All unit tests pass  (Step 1 + Step 4 of the TDD cycle)
#   2. No exported symbol in lib/ or app/api/v1/ lacks a test stub  (qa:generate)
#   3. ESLint passes cleanly (challenge criterion)
#
# AutoHeal is built into each gate:
#   Gate A failure → eslint --fix is applied, healed files are committed back, gate re-runs
#   Gate B failure → RCA emitted via sovereignErrorLogger; logic errors block the PR
#   Gate C failure → qa:generate emits missing stubs, stubs are committed back, gate re-runs
#
# CreatorLock: Jason Lee Avery (ROOT0) 🤛🏻
# RULE: Do NOT remove or weaken this gate.

permissions:
  contents: write
  pull-requests: write

on:
  push:
  pull_request:
    paths:
      - 'lib/**'
      - 'app/**'
      - 'pages/**'
      - 'components/**'
      - 'scripts/**'
      - '__tests__/**'
      - 'middleware.ts'
      - 'package.json'
      - 'package-lock.json'

jobs:
  adversarial-test-gate:
    name: ⚔️ Adversarial TDD Gate + AutoHeal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # Fetch the full ref so we can push healed commits back to the branch.
          # For PRs from forks this token won't have push permission; AutoHeal
          # will still emit RCA output and fail the gate gracefully.
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref }}

      - name: Use Node.js 22.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git for AutoHeal commits
        run: |
          git config user.name  "AveryOS AutoHeal Bot"
          git config user.email "autoheal@averyos.com"

      # ── Gate A: ESLint ───────────────────────────────────────────────────────
      # Challenge Criterion — zero ESLint errors required.
      # AutoHeal: eslint --fix is applied when errors are detected; the healed
      # diff is committed back to the branch before the gate is re-verified.
      - name: Gate A — ESLint ⛓️⚓⛓️
        id: gate_a
        run: npm run lint
        continue-on-error: true

      - name: Gate A — AutoHeal (eslint --fix + commit)
        if: steps.gate_a.outcome == 'failure'
        id: gate_a_heal
        run: |
          echo "⚕️ Gate A failed — initiating AveryOS AutoHeal …"
          node scripts/adversarialAutoHeal.cjs --gate A
          HEAL_EXIT=$?
          if [ $HEAL_EXIT -eq 0 ]; then
            # Commit any files changed by eslint --fix
            git add -A
            if git diff --cached --quiet; then
              echo "ℹ️  No files changed by eslint --fix."
            else
              git commit -m "⚕️ AutoHeal Gate A — eslint --fix upgrade ⛓️⚓⛓️"
              git push origin HEAD
              echo "✅ AutoHeal Gate A — healed diff committed."
            fi
            echo "GATE_A_HEALED=true" >> "$GITHUB_ENV"
          else
            echo "❌ Gate A AutoHeal could not resolve all ESLint errors."
            echo "GATE_A_HEALED=false" >> "$GITHUB_ENV"
          fi

      - name: Gate A — Re-verify after AutoHeal
        if: steps.gate_a.outcome == 'failure'
        run: |
          if [ "$GATE_A_HEALED" = "true" ]; then
            echo "🔄 Re-verifying Gate A after AutoHeal …"
            npm run lint
          else
            echo "❌ Gate A AutoHeal failed — ESLint errors are non-auto-fixable."
            exit 1
          fi

      # ── Gate B: Unit Tests ───────────────────────────────────────────────────
      # Steps 1 + 4 of TDD Review Cycle.
      # AutoHeal: re-runs tests once in case of transient failure; emits full
      # sovereign RCA output if they still fail (logic errors block the PR).
      - name: Gate B — Unit Tests (npm run test:unit) ⛓️⚓⛓️
        id: gate_b
        run: npm run test:unit
        continue-on-error: true

      - name: Gate B — AutoHeal (RCA + transient retry)
        if: steps.gate_b.outcome == 'failure'
        run: |
          echo "⚕️ Gate B failed — initiating AveryOS AutoHeal …"
          node scripts/adversarialAutoHeal.cjs --gate B
          HEAL_EXIT=$?
          if [ $HEAL_EXIT -ne 0 ]; then
            echo "❌ Gate B AutoHeal: unit test failures are not auto-healable — PR is blocked."
            exit 1
          fi

      # ── Gate C: Coverage Stub Audit ──────────────────────────────────────────
      # Step 4 adversarial QA check.
      # AutoHeal: qa:generate is run without --dry-run to emit missing stubs;
      # the generated stubs are committed back to the branch and the audit is
      # re-run to confirm all exports are covered.
      - name: Gate C — Coverage Stub Audit (npm run qa:generate) ⛓️⚓⛓️
        id: gate_c
        run: npm run qa:generate -- --dry-run
        env:
          CI: "true"
        continue-on-error: true

      - name: Gate C — AutoHeal (qa:generate + commit stubs)
        if: steps.gate_c.outcome == 'failure'
        id: gate_c_heal
        run: |
          echo "⚕️ Gate C failed — initiating AveryOS AutoHeal …"
          node scripts/adversarialAutoHeal.cjs --gate C
          HEAL_EXIT=$?
          if [ $HEAL_EXIT -eq 0 ]; then
            # Commit any newly generated stub files
            git add __tests__/generated/
            if git diff --cached --quiet; then
              echo "ℹ️  No new stub files to commit."
            else
              git commit -m "⚕️ AutoHeal Gate C — qa:generate stub upgrade ⛓️⚓⛓️"
              git push origin HEAD
              echo "✅ AutoHeal Gate C — generated stubs committed."
            fi
            echo "GATE_C_HEALED=true" >> "$GITHUB_ENV"
          else
            echo "❌ Gate C AutoHeal could not resolve all coverage gaps."
            echo "GATE_C_HEALED=false" >> "$GITHUB_ENV"
          fi

      - name: Gate C — Re-verify after AutoHeal
        if: steps.gate_c.outcome == 'failure'
        run: |
          if [ "$GATE_C_HEALED" = "true" ]; then
            echo "🔄 Re-verifying Gate C after AutoHeal …"
            npm run qa:generate -- --dry-run
          else
            echo "❌ Gate C AutoHeal failed — coverage gaps are non-auto-healable."
            exit 1
          fi
        env:
          CI: "true"

      # ── Final Seal ───────────────────────────────────────────────────────────
      - name: ⛓️⚓⛓️ Gate Seal — all gates passed
        run: |
          echo "⛓️⚓⛓️ TRI_AGENT_SEALED | ALIGNMENT: 100.000% | ALL GATES PASSED"
          echo "Gate A (ESLint):         ✅"
          echo "Gate B (Unit Tests):     ✅"
          echo "Gate C (Stub Coverage):  ✅"

