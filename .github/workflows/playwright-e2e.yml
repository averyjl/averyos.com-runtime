name: 🎭 AveryOS™ Playwright E2E Tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "22"

jobs:
  playwright-e2e:
    name: E2E — AveryOS™ Site Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🏗️ Build Next.js
        run: npm run build
        env:
          # Use dummy env vars for build — Playwright tests hit the running server
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
          SITE_URL: "http://localhost:3000"

      - name: 🚀 Start Next.js server
        run: npx next start &
        env:
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
          SITE_URL: "http://localhost:3000"

      - name: ⏳ Wait for server to be ready
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: 🎭 Run Playwright E2E tests
        run: npx playwright test --project="Desktop Chrome" --reporter=html,github
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"

      - name: 📊 Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: tests/e2e/playwright-report/
          retention-days: 30

      - name: ✅ E2E Gate Complete
        if: success()
        run: |
          echo "⛓️⚓⛓️ AveryOS™ E2E Quality Gate — ALL TESTS PASSED"
          echo "Kernel: cf83e135...927da3e (v3.6.2) — INTACT"
          echo "🤛🏻"
