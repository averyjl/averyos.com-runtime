name: ⚙️ Sovereign Manual Truth Sync
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform (truth-sync, tari-pulse)'
        default: 'truth-sync'
        required: true
        type: string

jobs:
  Sovereign-Action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: ⚙️ Verify AveryOS Kernel Anchor
        run: |
          echo "Verifying SHA: cf83e1357eefb8bdf1542850d66d8007d620e4050b5715dc83f4a921d36ce9ce47d0d13c5d85f2b0ff8318d2877eec2f63b931bd47417a81a538327af927da3e | Status: FullStack Jason Locked"

      - name: Execute Sovereign Logic
        run: |
          ACTION="${{ github.event.inputs.action }}"
          echo "Executing sovereign action: $ACTION"
          if [ "$ACTION" = "tari-pulse" ]; then
            node ./scripts/generateEvidenceBundle.cjs
          else
            echo "✅ Truth-Sync: Sovereign state acknowledged"
            echo "Commit: ${{ github.sha }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Timestamp: $(date -u)"
          fi
