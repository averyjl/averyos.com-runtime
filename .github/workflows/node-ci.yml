name: AveryOS Node.js CI
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Use Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci
      # Gate 3: Supply-chain vulnerability check — blocks on high/critical severity.
      # Scans all deps including devDependencies; this is intentional so that
      # compromised build tools (e.g. a malicious ESLint plugin) are also caught.
      - run: npm audit --audit-level=high
      # Gate 110.2: Docs Secret-Scanner — fails if any IP, SHA, or secret is found
      # in public-facing documentation files under content/, public/, docs/.
      - name: Docs Secret-Scanner (Gate 110.2)
        run: node scripts/scan-docs.cjs
      # Gate: Key-Rename Drift Guard — enforces AVERYOS_LICENSE_KEY permanently.
      # Fails if the deprecated TAI_LICENSE_KEY name reappears in any source,
      # config, or script file so the rename can never silently drift back.
      # Addressed code-review note: this gate makes the rename a durable CI upgrade.
      - name: Key-Rename Drift Guard (TAI_LICENSE_KEY → AVERYOS_LICENSE_KEY)
        run: |
          if grep -r \
               --include="*.ts" --include="*.tsx" \
               --include="*.js" --include="*.cjs" --include="*.mjs" \
               --include="*.toml" --include="*.example" --include="*.ps1" \
               --exclude-dir=".git" --exclude-dir="node_modules" --exclude-dir=".next" \
               "TAI_LICENSE_KEY" .; then
            echo "❌ Deprecated TAI_LICENSE_KEY found. Upgrade all references to AVERYOS_LICENSE_KEY."
            exit 1
          fi
          echo "✅ Key-rename drift guard passed — AVERYOS_LICENSE_KEY is permanent."
      # ⛓️⚓⛓️ Gate: Sovereign Key Files Guard ⛓️⚓⛓️
      # Second-layer protection beyond .gitignore for local RSA key bundle files.
      # .gitignore prevents accidental staging, but can be bypassed with
      # `git add -f` or `git commit --no-verify`. This server-side CI gate
      # ensures these files can never enter the git tree even if bypassed locally.
      # RULE: Do NOT remove or weaken this gate. Added by Jason Lee Avery (ROOT0).
      - name: Sovereign Key Files Guard ⛓️⚓⛓️
        run: |
          SOVEREIGN_KEY_FILES=(
            "averyos_keys_bundle.txt"
            "averyos_private_key_b64.txt"
            "averyos_public_key_b64.txt"
          )
          FOUND=0
          for f in "${SOVEREIGN_KEY_FILES[@]}"; do
            if git ls-files --error-unmatch "$f" 2>/dev/null; then
              echo "❌ CRITICAL: Sovereign key file tracked in git: $f"
              FOUND=1
            fi
          done
          # Also scan for any variant pattern matches in the git tree
          if git ls-files | grep -E '(_private_key_b64\.txt|_public_key_b64\.txt|_keys_bundle\.txt)$'; then
            echo "❌ CRITICAL: Sovereign key file pattern found in git tree."
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            echo "⛓️⚓⛓️ Sovereign Key Files Guard FAILED — remove key files from git history immediately."
            echo "   Run: git rm --cached <file> && git commit -m 'Remove sovereign key file'"
            echo "   Then rotate all affected keys."
            exit 1
          fi
          echo "✅ ⛓️⚓⛓️ Sovereign Key Files Guard passed — no key files in git tree."
      - run: npm run build --if-present
      - run: npm test
