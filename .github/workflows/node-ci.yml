name: ⚔️ AveryOS Node.js CI
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Use Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci
      # Gate 3: Supply-chain vulnerability check — blocks on high/critical severity.
      # Scans all deps including devDependencies; this is intentional so that
      # compromised build tools (e.g. a malicious ESLint plugin) are also caught.
      - run: npm audit --audit-level=high
      # Gate 110.2: Docs Secret-Scanner — fails if any IP, SHA, or secret is found
      # in public-facing documentation files under content/, public/, docs/.
      - name: Docs Secret-Scanner (Gate 110.2)
        run: node scripts/scan-docs.cjs
      # Gate: Key-Rename Drift Guard — enforces AVERYOS_LICENSE_KEY permanently.
      # Fails if the deprecated TAI_LICENSE_KEY name reappears in any source,
      # config, or script file so the rename can never silently drift back.
      # Addressed code-review note: this gate makes the rename a durable CI upgrade.
      - name: Key-Rename Drift Guard (TAI_LICENSE_KEY → AVERYOS_LICENSE_KEY)
        run: |
          if grep -r \
               --include="*.ts" --include="*.tsx" \
               --include="*.js" --include="*.cjs" --include="*.mjs" \
               --include="*.toml" --include="*.example" --include="*.ps1" \
               --exclude-dir=".git" --exclude-dir="node_modules" --exclude-dir=".next" \
               "TAI_LICENSE_KEY" .; then
            echo "❌ Deprecated TAI_LICENSE_KEY found. Upgrade all references to AVERYOS_LICENSE_KEY."
            exit 1
          fi
          echo "✅ Key-rename drift guard passed — AVERYOS_LICENSE_KEY is permanent."
      # Gate: License Nomenclature Drift Guard (GATE 111.4.3) — enforces correct
      # license constant naming.  Fails CI if the deprecated 'TAI_License' identifier
      # appears in any source or config file so the naming can never silently drift.
      - name: License Nomenclature Drift Guard (TAI_License)
        run: |
          if grep -r \
               --include="*.ts" --include="*.tsx" \
               --include="*.js" --include="*.cjs" --include="*.mjs" \
               --include="*.toml" --include="*.example" --include="*.ps1" \
               --exclude-dir=".git" --exclude-dir="node_modules" --exclude-dir=".next" \
               "TAI_License" .; then
            echo "❌ Deprecated 'TAI_License' nomenclature found. Upgrade all references to use AVERYOS_LICENSE_KEY."
            exit 1
          fi
          echo "✅ License nomenclature drift guard passed — 'TAI_License' is not present."
      # ⛓️⚓⛓️ Gate: Sovereign Leak Guard — dynamic, comprehensive git-tree protection
      # Replaces the hardcoded 3-file Sovereign Key Files Guard with a fully dynamic
      # guard that covers ALL .gitignore patterns and ALL tracked files.
      #
      # Layer 1 — Git-Tree Pattern Guard:
      #   Reads every pattern from .gitignore at runtime and checks `git ls-files`
      #   against all of them. Stays current automatically as .gitignore grows.
      #   Covers key files, docs, tests, logs, configs, env files, backups, etc.
      #   Applies gitignore negation (! rules) with last-rule-wins semantics so
      #   intentionally-tracked exceptions (.gitkeep, source capsules) are not flagged.
      #
      # Layer 2 — Content Pattern Guard:
      #   Scans ALL tracked files for embedded private key material (PEM blocks
      #   with actual key content, Stripe live keys, GitHub PATs).
      #
      # Cannot be bypassed locally — runs server-side on GitHub's infrastructure.
      # RULE: Do NOT remove or weaken this gate. Added by Jason Lee Avery (ROOT0).
      - name: Sovereign Leak Guard ⛓️⚓⛓️
        run: node scripts/sovereign-leak-guard.cjs
      - run: npm run build
      - run: npm test
      # ⛓️⚓⛓️ Gate: Full ESLint Security Scan — catches security warnings/errors
      # that `next lint` skips (electron/, scripts/, workers/).
      # Uses --quiet so only ESLint *errors* fail CI; warnings are visible in
      # the dedicated eslint.yml SARIF workflow but do not block the build.
      # This is the "ride the code" permanent upgrade — issues are caught on
      # every commit/PR before they appear as SARIF annotations.
      # RULE: Do NOT remove or weaken this gate.
      - name: Security ESLint Gate ⛓️⚓⛓️
        run: npm run lint:full
