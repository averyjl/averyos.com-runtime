name: AveryOS Node.js CI
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Use Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci
      # Gate 3: Supply-chain vulnerability check — blocks on high/critical severity.
      # Scans all deps including devDependencies; this is intentional so that
      # compromised build tools (e.g. a malicious ESLint plugin) are also caught.
      - run: npm audit --audit-level=high
      # Gate 110.2: Docs Secret-Scanner — fails if any IP, SHA, or secret is found
      # in public-facing documentation files under content/, public/, docs/.
      - name: Docs Secret-Scanner (Gate 110.2)
        run: node scripts/scan-docs.cjs
      - run: npm run build --if-present
      - run: npm test
