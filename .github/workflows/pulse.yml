name: ⚓ AveryOS Lighthouse Pulse

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours to slash costs
  workflow_dispatch:

jobs:
  pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Configure Git Identity
        run: |
          git config --global user.email "truth@averyworld.com"
          git config --global user.name "averyjl"
      - name: Execute Sovereign Pulse
        run: node scripts/lighthouse.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
