name: ⚓ AveryOS Lighthouse Pulse

on:
  schedule:
    - cron: '0 */1 * * *' # Every 1 hour to slash costs
  workflow_dispatch:

jobs:
  pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
      - name: Configure Git Identity
        run: |
          git config --global user.email "truth@averyworld.com"
          git config --global user.name "averyjl"
          git pull origin main --rebase
      - name: Execute Sovereign Pulse
        run: |
          node scripts/lighthouse.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
