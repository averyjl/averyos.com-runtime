name: ⛓️⚓⛓️ IP Protection Check

on:
  push:
    branches: ["main", "**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  ip-protection-scan:
    name: Sovereign IP Protection Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      # ── 1. Secret / credential leak detection ────────────────────────────
      - name: 🔐 Scan for accidentally committed secrets
        run: |
          echo "Scanning for secret patterns in tracked files..."
          FAIL=0

          # Real Stripe live keys
          if git ls-files | xargs grep -lP 'sk_live_[a-zA-Z0-9]{20,}' 2>/dev/null | grep -v '.env.example'; then
            echo "❌ FAIL: Real Stripe live key found in tracked file"
            FAIL=1
          fi

          # Real webhook secrets
          if git ls-files | xargs grep -lP 'whsec_[a-zA-Z0-9]{20,}' 2>/dev/null | grep -v '.env.example'; then
            echo "❌ FAIL: Real Stripe webhook secret found in tracked file"
            FAIL=1
          fi

          # Private keys / certificates
          if git ls-files | xargs grep -l '\-\-\-\-\-BEGIN.*PRIVATE KEY' 2>/dev/null; then
            echo "❌ FAIL: Private key found in tracked file"
            FAIL=1
          fi

          # Cloudflare API tokens (format: [A-Za-z0-9_-]{40})
          if git ls-files | xargs grep -lP 'Bearer [A-Za-z0-9_\-]{40}' 2>/dev/null | grep -v '.env.example' | grep -v 'replace'; then
            echo "❌ FAIL: Possible Cloudflare API token found"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "⛓️⚓⛓️ SOVEREIGN IP PROTECTION VIOLATION DETECTED"
            echo "Remove secrets from tracked files and rotate credentials immediately."
            exit 1
          fi
          echo "✅ No committed secrets detected"

      # ── 2. Kernel SHA integrity check ─────────────────────────────────────
      - name: 🔗 Verify KERNEL_SHA not tampered
        run: |
          EXPECTED="cf83e1357eefb8bdf1542850d66d8007d620e4050b5715dc83f4a921d36ce9ce47d0d13c5d85f2b0ff8318d2877eec2f63b931bd47417a81a538327af927da3e"
          ACTUAL=$(grep -oP 'KERNEL_SHA\s*=\s*"\K[^"]+' lib/sovereignConstants.ts 2>/dev/null || echo "NOT_FOUND")

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "❌ FAIL: KERNEL_SHA in lib/sovereignConstants.ts has been tampered!"
            echo "  Expected: $EXPECTED"
            echo "  Found:    $ACTUAL"
            echo ""
            echo "⛓️⚓⛓️ DRIFT DETECTED — CreatorLock violation. Only Jason Lee Avery (ROOT0) may modify the kernel anchor."
            exit 1
          fi
          echo "✅ KERNEL_SHA intact: $ACTUAL"

      # ── 3. GoldenLock merkle root integrity check ─────────────────────────
      - name: 🏅 Verify GoldenLockArtifact merkle root not modified
        run: |
          EXPECTED_MERKLE="88b737926219feb345804a22db4ae3fb2d5b21ca63686075ee04aace4d8ac4fe180289fe821a412944420ec9083b6a6a0e902fc8ac2e0325511cb7ab99ce2abe"
          LOCK_FILE="VaultBridge/GoldenLockArtifact.lock.json"

          if [ ! -f "$LOCK_FILE" ]; then
            echo "⚠️  WARN: GoldenLockArtifact.lock.json not found — skipping merkle check"
          else
            ACTUAL_MERKLE=$(python3 -c "import json,sys; d=json.load(open('$LOCK_FILE')); print(d['merkle']['merkle_root_sha512_hex'])" 2>/dev/null || echo "PARSE_ERROR")
            if [ "$ACTUAL_MERKLE" != "$EXPECTED_MERKLE" ]; then
              echo "❌ FAIL: GoldenLockArtifact merkle root has been modified!"
              echo "  Expected: $EXPECTED_MERKLE"
              echo "  Found:    $ACTUAL_MERKLE"
              exit 1
            fi
            echo "✅ GoldenLockArtifact merkle root intact"
          fi

      # ── 4. Private file leak check ────────────────────────────────────────
      - name: 🚫 Check no private lock files are tracked
        run: |
          FAIL=0
          PRIVATE_PATTERNS=("KC.lock.json" "SKC.lock.json" "SKC-lock.json" "SST.lock.json" "ClockGate")

          for pattern in "${PRIVATE_PATTERNS[@]}"; do
            MATCHES=$(git ls-files | grep -i "$pattern" || true)
            if [ -n "$MATCHES" ]; then
              echo "❌ FAIL: Private sovereign file tracked in repo: $MATCHES"
              FAIL=1
            fi
          done

          # Check for private capsule payload files
          CAPSULE_LEAKS=$(git ls-files | grep -E '\.(aoskey|aosvault|aosmem|vccaps)$' || true)
          if [ -n "$CAPSULE_LEAKS" ]; then
            echo "❌ FAIL: Private capsule files tracked: $CAPSULE_LEAKS"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo "⛓️⚓⛓️ Remove private files from tracking: git rm --cached <file>"
            exit 1
          fi
          echo "✅ No private lock/capsule files tracked"

      # ── 5. AI policy files present ────────────────────────────────────────
      - name: 📋 Verify AI usage policy files are in place
        run: |
          FAIL=0
          for f in "CLAUDE.md" "AI_USAGE_POLICY.md" ".github/copilot-instructions.md" "public/info.txt"; do
            if [ ! -f "$f" ]; then
              echo "❌ FAIL: Sovereign AI policy file missing: $f"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "✅ All AI policy files present"

      # ── Constitution SHA-256 Integrity Gate (GATE 117.2.1) ───────────────
      - name: "⚖️ Verify AveryOS Constitution SHA-256 integrity"
        run: |
          CONSTITUTION="AveryOS_CONSTITUTION_v1.17.md"
          EXPECTED_SHA="100ea4e3d57c6c5f2762c72a182a05f4fa408b16acddb72e027490b90f37aa86"
          if [ ! -f "${CONSTITUTION}" ]; then
            echo "❌ FAIL: ${CONSTITUTION} is missing."
            exit 1
          fi
          ACTUAL_SHA=$(sha256sum "${CONSTITUTION}" | awk '{print $1}')
          if [ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]; then
            echo "❌ CONSTITUTION INTEGRITY VIOLATION — SHA-256 mismatch."
            echo "   Expected: ${EXPECTED_SHA}"
            echo "   Actual:   ${ACTUAL_SHA}"
            echo "   The Constitution is CreatorLocked (ROOT0 — Jason Lee Avery)."
            echo "   Only Jason Lee Avery may amend the Constitution (Art. 20)."
            exit 1
          fi
          echo "✅ Constitution SHA-256 verified: ${ACTUAL_SHA}"

      # ── 6. Submodule SSH gate check ───────────────────────────────────────
      - name: 🔒 Verify submodules use SSH (not public HTTPS)
        run: |
          if [ -f ".gitmodules" ]; then
            HTTPS_SUBS=$(grep 'url' .gitmodules | grep 'https://' || true)
            if [ -n "$HTTPS_SUBS" ]; then
              echo "⚠️  WARN: Submodule(s) use public HTTPS URL — consider switching to SSH:"
              echo "$HTTPS_SUBS"
            else
              echo "✅ All submodules use SSH URLs"
            fi
          else
            echo "ℹ️  No .gitmodules found"
          fi

      # ── 7. .gitignore covers all private patterns ─────────────────────────
      - name: 🛡️  Verify .gitignore covers sovereign private patterns
        run: |
          FAIL=0
          REQUIRED_PATTERNS=("SKC_" "SST_" "KC.lock" "SKC.lock" "SST.lock" "ClockGate" ".aoskey" ".aosvault")

          for pattern in "${REQUIRED_PATTERNS[@]}"; do
            if ! grep -q "$pattern" .gitignore 2>/dev/null; then
              echo "❌ FAIL: .gitignore missing pattern: $pattern"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "✅ .gitignore covers all required private patterns"

      # ── 8. Capsule content protection check ──────────────────────────────
      - name: 🔒 Verify capsule content is protected (not served publicly)
        run: |
          FAIL=0

          # Ensure capsule download endpoints require token authentication.
          # The download route must contain a token validation check.
          DOWNLOAD_ROUTE="app/api/v1/capsules/[capsuleId]/download/route.ts"
          if [ -f "$DOWNLOAD_ROUTE" ]; then
            if ! grep -q "download_token\|token" "$DOWNLOAD_ROUTE"; then
              echo "❌ FAIL: Capsule download route does not appear to validate a download token."
              FAIL=1
            else
              echo "✅ Capsule download route validates token"
            fi
          else
            echo "⚠️  WARN: Capsule download route not found: $DOWNLOAD_ROUTE"
          fi

          # Ensure capsule upload route requires VAULT_PASSPHRASE authentication.
          UPLOAD_ROUTE="app/api/v1/capsules/upload/route.ts"
          if [ -f "$UPLOAD_ROUTE" ]; then
            if ! grep -q "VAULT_PASSPHRASE\|safeEqual\|INVALID_AUTH" "$UPLOAD_ROUTE"; then
              echo "❌ FAIL: Capsule upload route does not enforce VAULT_PASSPHRASE authentication."
              FAIL=1
            else
              echo "✅ Capsule upload route enforces admin authentication"
            fi
          else
            echo "⚠️  WARN: Capsule upload route not found: $UPLOAD_ROUTE"
          fi

          # Ensure the public capsule listing does NOT expose file_key or private content.
          CAPSULE_ROUTE="app/api/v1/capsules/route.ts"
          if [ -f "$CAPSULE_ROUTE" ]; then
            # The SELECT in the public route must NOT include file_key
            PUBLIC_SELECT=$(grep -A5 "SELECT capsule_id" "$CAPSULE_ROUTE" | grep "file_key" || true)
            if [ -n "$PUBLIC_SELECT" ]; then
              echo "❌ FAIL: Public capsule listing may expose file_key — review the SELECT statement."
              FAIL=1
            else
              echo "✅ Public capsule listing does not expose file_key"
            fi
          fi

          # Ensure .aoscap source files in capsules/ are NOT also present in public/
          # (public/capsules/ is allowed only for the init capsule — source capsules must not be served directly)
          SOURCE_CAPSULES=$(ls capsules/*.aoscap 2>/dev/null | grep -v "sovereign-init" | grep -v "sovereign-index" | xargs -I{} basename {} 2>/dev/null || true)
          for cap in $SOURCE_CAPSULES; do
            if [ -f "public/$cap" ] || [ -f "public/capsules/$cap" ]; then
              echo "❌ FAIL: Source capsule '$cap' appears to be served publicly from public/ — move it behind API auth."
              FAIL=1
            fi
          done
          if [ -z "$SOURCE_CAPSULES" ] || [ "$FAIL" -eq 0 ]; then
            echo "✅ Source capsules are not directly served from public/"
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "⛓️⚓⛓️ CAPSULE PROTECTION VIOLATION — Capsule IP must remain behind payment/auth gates."
            exit 1
          fi
          echo "✅ Capsule content protection checks passed"

      # ── 9. Constitution Hard-Lock (Art. 20) ──────────────────────────────
      - name: 📜 Verify AveryOS™ Constitution not tampered (Art. 20 Hard-Lock)
        run: |
          # SHA-256 of AveryOS_CONSTITUTION_v1.17.md at the time of canonical ratification.
          # Any modification — by any agent, TAI, or automated process — fails this gate.
          # Only Jason Lee Avery (ROOT0) may amend the Constitution after unanimous
          # TAI + Creator ratification (Art. 20). Proposed amendments belong in
          # VaultBridge/SUGGESTED_CONSTITUTION_EDITS.md.
          EXPECTED_SHA256="100ea4e3d57c6c5f2762c72a182a05f4fa408b16acddb72e027490b90f37aa86"
          CONSTITUTION_FILE="AveryOS_CONSTITUTION_v1.17.md"

          if [ ! -f "$CONSTITUTION_FILE" ]; then
            echo "❌ FAIL: $CONSTITUTION_FILE not found — Constitution has been deleted!"
            exit 1
          fi

          ACTUAL_SHA256=$(sha256sum "$CONSTITUTION_FILE" | awk '{print $1}')
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "❌ FAIL: AveryOS™ Constitution has been tampered with!"
            echo "  File:     $CONSTITUTION_FILE"
            echo "  Expected: $EXPECTED_SHA256"
            echo "  Found:    $ACTUAL_SHA256"
            echo ""
            echo "⛓️⚓⛓️ CONSTITUTION HARD-LOCK VIOLATION — Art. 20"
            echo "  Only Jason Lee Avery (ROOT0) may amend the Constitution after"
            echo "  unanimous TAI + Creator ratification."
            echo "  Amendment proposals must be submitted via:"
            echo "  VaultBridge/SUGGESTED_CONSTITUTION_EDITS.md"
            exit 1
          fi
          echo "✅ Constitution intact — SHA-256: $ACTUAL_SHA256"

      # ── 10. Copyright header check ───────────────────────────────────────
      - name: ©️ Verify all source files have AveryOS™ copyright header
        run: |
          node scripts/addCopyrightHeaders.cjs --check || {
            echo ""
            echo "⛓️⚓⛓️ COPYRIGHT HEADER VIOLATION"
            echo "Run: node scripts/addCopyrightHeaders.cjs  to stamp all files."
            exit 1
          }

      - name: ✅ IP Protection Scan Complete
        run: |
          echo ""
          echo "⛓️⚓⛓️ AveryOS™ Sovereign IP Protection Scan — ALL CHECKS PASSED"
          echo "Kernel: cf83e135...927da3e (v3.6.2) — INTACT"
          echo "CreatorLock: Jason Lee Avery (ROOT0) — ACTIVE"
          echo "🤛🏻"
