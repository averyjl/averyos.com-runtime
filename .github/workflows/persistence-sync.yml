name: 🔁 Persistence Sync — VaultChain Commit

on:
  # Trigger automatically when files land in logs/persistence/ via push
  push:
    paths:
      - "logs/persistence/**"
  # Allow manual dispatch (e.g. after running persistence-sync.cjs locally)
  workflow_dispatch:
    inputs:
      message:
        description: "Optional commit message suffix"
        required: false
        default: ""

jobs:
  sync:
    name: Commit persistence logs to vaultchain branch
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main with full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up git identity
        run: |
          git config user.name  "AveryOS Persistence Bot"
          git config user.email "bot@averyos.com"

      - name: Switch to or create vaultchain branch
        run: |
          git fetch origin
          if git ls-remote --exit-code --heads origin vaultchain > /dev/null 2>&1; then
            git checkout vaultchain
            git merge --ff-only origin/main || echo "⚠️ FF merge skipped — branch has diverged"
          else
            git checkout -b vaultchain
            echo "✅ Created new vaultchain branch from main"
          fi

      - name: Copy new persistence files from main
        run: |
          git checkout origin/main -- logs/persistence/ 2>/dev/null || true

      - name: Stage and commit
        run: |
          git add logs/persistence/
          if git diff --cached --quiet; then
            echo "✅ Nothing new to commit."
          else
            SUFFIX="${{ github.event.inputs.message }}"
            TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            MSG="⛓️ persistence-sync ${TS}${SUFFIX:+ — $SUFFIX}"
            git commit -m "$MSG"
          fi

      - name: Push to vaultchain branch
        run: |
          git push origin vaultchain
