name: 🎭 AveryOS™ Playwright E2E Tests — World-Class UI QA

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Use Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Build Next.js
        run: npm run build
        env:
          # Use dummy env vars for build — tests run against built app
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_placeholder' }}
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
          SITE_URL: "http://localhost:3000"

      - name: Run Playwright E2E Tests
        run: npm run test:e2e
        env:
          TEST_BASE_URL: "http://localhost:3000"
          CI: "true"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # FCA: On failure, run root-cause analysis
      - name: FCA — Playwright Failure Auto-Heal Report
        if: failure()
        run: |
          echo "⚠️ PLAYWRIGHT FCA REPORT"
          echo "========================"
          echo "One or more UI tests failed. FCA analysis:"
          echo "1. Check playwright-report artifact for full test details"
          echo "2. Screenshots and videos are attached to failed tests"
          echo "3. Console errors are logged per-test"
          echo ""
          echo "Auto-heal: All test failures must be resolved at code design stage."
          echo "Do NOT merge PR with failing E2E tests."
