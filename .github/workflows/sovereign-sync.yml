name: ⚓ AveryOS Sovereign Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
      - name: Verify Codebase Integrity
        run: node scripts/forgeMeshProofKit.cjs
      - name: Sync Sovereign Reflection
        run: |
          git config user.name "AveryOS Sovereign Bot"
          git config user.email "bot@averyos.com"
          git add capsule_logs/
          if git diff --cached --quiet; then
            echo "No new artifacts to commit."
          else
            git commit -m "⚓ Sovereign Sync: MeshProofKit $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          fi
          git pull --rebase origin main
          git push origin main
