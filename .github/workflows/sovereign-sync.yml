name: ⚓ AveryOS Sovereign Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify Codebase Integrity
        run: node scripts/forgeMeshProofKit.cjs
      - name: Sync Sovereign Reflection
        run: git push origin main
