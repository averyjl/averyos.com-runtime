# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ⚠️ IMPORTANT: If this workflow fails with "CodeQL analyses from advanced
# configurations cannot be processed when the default setup is enabled", you
# must disable the GitHub Default CodeQL setup first:
#   Repo Settings → Security → Code scanning → CodeQL analysis → Default setup → Disable
# This advanced configuration adds 'actions' language scanning not available in the default setup.
#
name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '25 16 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Runner size impacts CodeQL analysis time. To learn more, please see:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners (GitHub.com only)
    # Consider using larger runners or machines with greater resources for possible analysis time improvements.
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: javascript-typescript
          build-mode: none
        # CodeQL supports the following values keywords for 'language': 'actions', 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'rust', 'swift'
        # Use `c-cpp` to analyze code written in C, C++ or both
        # Use 'java-kotlin' to analyze code written in Java, Kotlin or both
        # Use 'javascript-typescript' to analyze code written in JavaScript, TypeScript or both
        # Note: 'actions' language scanning is omitted because it conflicts with the GitHub Default CodeQL setup.
        # To re-enable 'actions' scanning, disable the Default CodeQL setup in:
        #   Repo Settings → Security → Code scanning → CodeQL analysis → Default setup → Disable
        # To learn more about changing the languages that are analyzed or customizing the build mode for your analysis,
        # see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning.
        # If you are analyzing a compiled language, you can modify the 'build-mode' for that language to customize how
        # your codebase is analyzed, see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages
    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    # Add any setup steps before running the `github/codeql-action/init` action.
    # This includes steps like installing compilers or runtimes (`actions/setup-node`
    # or others). This is typically only required for manual builds.
    # - name: Setup runtime (example)
    #   uses: actions/setup-example@v1

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@89a39a4e59826350b863aa6b6252a07ad50cf83e
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # Run the "security-and-quality" extended suite in addition to the default
        # queries. The "+" prefix adds them on top of the default set rather than
        # replacing it, maximising detection coverage at the design stage.
        queries: +security-and-quality

    # If the analyze step fails for one of the languages you are analyzing with
    # "We were unable to automatically build your code", modify the matrix above
    # to set the build mode to "manual" for that language. Then modify this step
    # to build your code.
    # ℹ️ Command-line programs to run using the OS shell.
    # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun
    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo 'If you are using a "manual" build mode for one or more of the' \
          'languages you are analyzing, replace this with the commands to build' \
          'your code, for example:'
        echo '  make bootstrap'
        echo '  make release'
        exit 1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@89a39a4e59826350b863aa6b6252a07ad50cf83e
      with:
        category: "/language:${{matrix.language}}"
        output: sarif-results

    # ── AveryOS™ Design-Stage Security Gate ────────────────────────────────────
    # Parse the SARIF output produced above. If any finding has CodeQL severity
    # "error" (covers SSRF/CWE-918, SQLi, XSS, path-traversal, prototype pollution,
    # and every other critical class), this step exits with code 1, failing the
    # required status check and blocking the PR from merging into main.
    #
    # This makes CodeQL a hard gate at the DESIGN STAGE — security issues are
    # caught and annotated in the PR diff before they ever reach production.
    #
    # To enforce this gate:
    #   Repo Settings → Branches → main → Require status checks →
    #   Add "CodeQL Advanced / Analyze (javascript-typescript)"
    - name: Block PR on Security Findings
      env:
        LANGUAGE: ${{ matrix.language }}
      run: |
        node -e "
        const fs   = require('fs');
        const path = require('path');
        const dir  = 'sarif-results';

        if (!fs.existsSync(dir)) {
          console.log('No SARIF output directory — skipping security gate.');
          process.exit(0);
        }

        const files = fs.readdirSync(dir).filter(f => f.endsWith('.sarif'));
        if (files.length === 0) {
          console.log('No SARIF files — skipping security gate.');
          process.exit(0);
        }

        let errorCount = 0;
        for (const file of files) {
          const sarif  = JSON.parse(fs.readFileSync(path.join(dir, file), 'utf8'));
          for (const run of (sarif.runs || [])) {
            for (const result of (run.results || [])) {
              if (result.level !== 'error') continue;
              errorCount++;
              const loc    = ((result.locations || [])[0] || {});
              const pLoc   = loc.physicalLocation || {};
              const uri    = (pLoc.artifactLocation || {}).uri || 'unknown';
              const line   = (pLoc.region || {}).startLine || 0;
              const msg    = (result.message || {}).text || 'Security finding';
              const ruleId = result.ruleId || '';
              process.stderr.write(
                '::error file=' + uri + ',line=' + line + '::' +
                ruleId + ': ' + msg + '\n'
              );
            }
          }
        }

        if (errorCount > 0) {
          process.stderr.write(
            '::error::AveryOS\u2122 Security Gate: ' + errorCount +
            ' CodeQL error-severity finding(s) must be resolved before this ' +
            'PR can merge. Navigate to the repository Security tab \u2192 ' +
            'Code scanning alerts for full details and recommended remediation. ' +
            'Each finding is also annotated inline in the PR diff above.\n'
          );
          process.exit(1);
        }
        console.log(
          'AveryOS\u2122 Security Gate: 0 CodeQL error-severity findings. Safe to merge.'
        );
        "

