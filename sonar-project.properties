# AveryOS Sovereign QA Standards
sonar.projectKey=averyjl_averyos-com-runtime
sonar.organization=averyjl
sonar.projectName=AveryOS Sovereign v4.0
sonar.qualitygate.wait=true

# ── Source roots (all TypeScript/React source; NOT generated or test dirs) ────
sonar.sources=app,lib,components,pages,src,middleware.ts,workers
sonar.tests=__tests__,tests

# ── Exclusions: generated, test, build, tooling, and config files ─────────────
sonar.exclusions=\
  node_modules/**,\
  .open-next/**,\
  .next/**,\
  public/**,\
  migrations/**,\
  scripts/**,\
  __tests__/**,\
  tests/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.gen.test.ts,\
  **/generated/**,\
  capsules/**,\
  backups/**,\
  logs/**,\
  VaultEcho/**,\
  VaultBridge/**,\
  functions/**,\
  electron/**

# ── CPD (Copy-Paste Detection) exclusions ─────────────────────────────────────
# API route handlers share structural boilerplate (import, GET/POST, error handling).
# Generated test stubs are intentionally similar by design.
# Sovereign kernel constants and error codes must repeat across modules.
sonar.cpd.exclusions=\
  app/api/**,\
  pages/api/**,\
  lib/sovereignConstants.ts,\
  lib/sovereignError.ts,\
  __tests__/generated/**,\
  src/**
