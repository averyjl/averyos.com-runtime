# AveryOS Sovereign QA Standards
sonar.projectKey=averyjl_averyos-com-runtime
sonar.organization=averyjl
sonar.projectName=AveryOS Sovereign v4.0
sonar.qualitygate.wait=true

# ── Source roots (directories only — never individual files) ────────────────
sonar.sources=app,lib,components,pages,src,workers
sonar.tests=__tests__,tests

# ── Exclusions: generated, test, build, tooling, and config files ─────────────
sonar.exclusions=\
  node_modules/**,\
  .open-next/**,\
  .next/**,\
  public/**,\
  migrations/**,\
  scripts/**,\
  __tests__/**,\
  tests/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.gen.test.ts,\
  **/generated/**,\
  capsules/**,\
  backups/**,\
  logs/**,\
  VaultEcho/**,\
  VaultBridge/**,\
  functions/**,\
  electron/**

# ── CPD (Copy-Paste Detection) exclusions ─────────────────────────────────────
# All Next.js route handlers and pages share structural boilerplate by design:
#   - route.ts files: import, GET/POST handlers, error handling, CORS headers
#   - page.tsx files: React component scaffold, metadata, JSX structure
# WKD route (.well-known) follows the same pattern as app/api routes.
# Generated stubs and sovereign constants repeat by design.
sonar.cpd.exclusions=\
  app/api/**,\
  app/.well-known/**,\
  app/**/page.tsx,\
  app/**/layout.tsx,\
  pages/api/**,\
  pages/**,\
  lib/sovereignConstants.ts,\
  lib/sovereignError.ts,\
  __tests__/generated/**,\
  src/**

# ── Coverage ────────────────────────────────────────────────────────────────
# LCOV report generated by sonarcloud.yml / sonar-analysis.yml workflows
# via: node --experimental-test-coverage --test-reporter=lcov
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: Next.js route handlers and pages are tested via
# Playwright E2E (not unit tests) — exclude them from coverage analysis.
# lib/ and components/ modules have unit tests and ARE measured.
sonar.coverage.exclusions=\
  app/**,\
  pages/**,\
  workers/**,\
  middleware.ts,\
  src/**
