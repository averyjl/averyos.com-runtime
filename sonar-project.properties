# AveryOS Sovereign QA Standards
sonar.projectKey=averyjl_averyos-com-runtime
sonar.organization=averyjl
sonar.projectName=AveryOS Sovereign v4.0
sonar.qualitygate.wait=true

# ── Source roots (directories only — never individual files) ────────────────
sonar.sources=app,lib,components,pages,src,workers
sonar.tests=__tests__,tests

# ── Exclusions: generated, test, build, tooling, and config files ─────────────
sonar.exclusions=\
  node_modules/**,\
  .open-next/**,\
  .next/**,\
  public/**,\
  migrations/**,\
  scripts/**,\
  __tests__/**,\
  tests/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.gen.test.ts,\
  **/generated/**,\
  capsules/**,\
  backups/**,\
  logs/**,\
  VaultEcho/**,\
  VaultBridge/**,\
  functions/**,\
  electron/**

# ── CPD (Copy-Paste Detection) exclusions ─────────────────────────────────────
# Framework code (Next.js app routes, pages, components, Cloudflare workers)
# MUST be excluded from duplication detection. Every route handler shares:
#   - CloudflareEnv / D1Database / KVNamespace minimal interface definitions
#   - getCloudflareContext() try/catch binding pattern
#   - aosErrorResponse() error handling boilerplate
#   - Copyright block header (repeated by design across all sovereign files)
#
# Background: sonar.sources was previously "src" (9 files). Correcting it to
# include all project source directories means SonarCloud sees all route/page
# files as "new code" — exposing the expected framework boilerplate duplication.
# Excluding the entire framework layer (app/pages/components/workers) and keeping
# only pure-logic lib/ in CPD analysis gives accurate, signal-only duplication.
#
# Only lib/ code is subject to CPD — it contains unique business-logic utilities
# that should not be duplicated (sovereignConstants and sovereignError are also
# excluded as they define shared constants repeated by design).
sonar.cpd.exclusions=\
  app/**,\
  pages/**,\
  components/**,\
  workers/**,\
  middleware.ts,\
  lib/sovereignConstants.ts,\
  lib/sovereignError.ts,\
  __tests__/generated/**,\
  src/**

# ── Coverage ────────────────────────────────────────────────────────────────
# LCOV report generated by sonarcloud.yml / sonar-analysis.yml workflows
# via: node --experimental-test-coverage --test-reporter=lcov
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: Next.js route handlers, pages, components and workers
# are tested via Playwright E2E (not unit tests) — exclude them from coverage
# analysis. Only lib/ modules have Node.js unit tests and are measured.
# Note: components, workers, and app code are seen as "new" by SonarCloud
# (first analysis since sonar.sources was corrected from src-only) — excluding
# them from coverage prevents a false "new code coverage < 80%" gate failure.
sonar.coverage.exclusions=\
  app/**,\
  pages/**,\
  components/**,\
  workers/**,\
  middleware.ts,\
  src/**
